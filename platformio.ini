; PlatformIO Project Configuration File
; https://github.com/PeterkoCZ91/HLK-LD2412-security

[common]
platform = espressif32 @ 6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time, default
upload_protocol = esptool
upload_port = /dev/ttyUSB0
upload_speed = 115200
board_build.partitions = min_spiffs.csv
build_unflags = -std=gnu++11
build_flags =
	-std=gnu++17
	-D NO_BLUETOOTH=1
lib_deps =
	bblanchon/ArduinoJson
	knolleary/PubSubClient
	me-no-dev/AsyncTCP
	me-no-dev/ESPAsyncWebServer
	https://github.com/alanswx/ESPAsyncWiFiManager.git
	cotestatnt/AsyncTelegram2

; --- Board Variants ---
; Choose based on your ESP32 wiring (see README for pin diagrams)

[env:esp32_type_A]
extends = common
build_flags =
	-std=gnu++17
	-D NO_BLUETOOTH=1
	-D RADAR_RX_PIN=16
	-D RADAR_TX_PIN=17

[env:esp32_type_B]
extends = common
build_flags =
	-std=gnu++17
	-D NO_BLUETOOTH=1
	-D SERIAL_DEBUG=1
	-D RADAR_RX_PIN=18
	-D RADAR_TX_PIN=19
	-D RADAR_OUT_PIN=21

; Example: custom pin layout (e.g. swapped TX/RX, different output pin)
[env:esp32_custom]
extends = common
build_flags =
	-std=gnu++17
	-D NO_BLUETOOTH=1
	-D SERIAL_DEBUG=1
	-D RADAR_TX_PIN=18
	-D RADAR_RX_PIN=19
	-D RADAR_OUT_PIN=5

[env:production]
extends = common
build_flags =
	-std=gnu++17
	-D NO_BLUETOOTH=1
	-D LAB_MODE=0
	-D SERIAL_DEBUG=1
	-D MQTTS_ENABLED=0
	-D RADAR_RX_PIN=18
	-D RADAR_TX_PIN=19

; --- OTA Upload Template ---
; Copy and customize for your devices:
;
; [env:ota_my_device]
; extends = env:esp32_type_B
; upload_protocol = espota
; upload_port = 192.168.1.100
; upload_flags =
;     --auth=your_ota_password

; ============================================================================
; TEST ENVIRONMENTS
; ============================================================================

; Native tests - run on PC, NOT on hardware!
[env:test_native]
platform = native
test_framework = unity
test_filter = test_native*
build_flags =
    -std=gnu++17
    -D UNIT_TEST
    -D NATIVE_TEST
    -I test/test_native_parser
    -I test/test_native_security
build_src_filter = -<*>
lib_extra_dirs = lib
lib_deps = LD2412_Extended
